version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: spm_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: startup_monitor
    networks:
      - spm_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spm_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - NEWS_API_KEY=${NEWS_API_KEY:-}
    depends_on:
      - mongodb
    networks:
      - spm_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: spm_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - spm_net

volumes:
  mongo_data:

networks:
  spm_net:
    driver: bridge
